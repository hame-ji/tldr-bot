name: digest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      test_push:
        description: "Create a CI smoke commit"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: digest-pipeline
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_API_BASE: "https://openrouter.ai/api/v1"
      OPENROUTER_PREFERRED_MODELS: ${{ vars.OPENROUTER_PREFERRED_MODELS }}
      OPENROUTER_MIN_SPACING_SECONDS: "2"
      OPENROUTER_MAX_RETRIES: "8"
      OPENROUTER_INITIAL_BACKOFF_SECONDS: "10"
      OPENROUTER_MAX_BACKOFF_SECONDS: "180"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate required secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
          test -n "$OPENROUTER_API_KEY"

      - name: Validate Telegram bot token and clear webhook
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" >/tmp/getme.json
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=false" >/tmp/delete_webhook.json

      - name: Validate polling endpoint
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=1&timeout=0" >/tmp/getupdates.json

      - name: Run pipeline entrypoint
        id: pipeline
        run: |
          set -euo pipefail
          python src/main.py | tee /tmp/pipeline.log
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = os.environ["GITHUB_OUTPUT"]
          lines = Path("/tmp/pipeline.log").read_text(encoding="utf-8").splitlines()
          line = next((item for item in lines if item.startswith("run_outcome:")), None)
          if line is None:
              raise RuntimeError("pipeline did not emit run_outcome")

          payload = json.loads(line.split("run_outcome:", 1)[1].strip())
          processed_urls = int(payload.get("processed_urls", 0))
          digest_created = bool(payload.get("digest_created", False))

          with open(output_path, "a", encoding="utf-8") as file:
              file.write(f"processed_urls={processed_urls}\n")
              file.write(f"digest_created={str(digest_created).lower()}\n")
          PY

      - name: Commit and push pipeline outputs
        if: ${{ steps.pipeline.outputs.processed_urls != '0' }}
        run: |
          set -euo pipefail

          TODAY_UTC=$(date -u +%F)
          DAILY_SUBJECT="chore(digest): ${TODAY_UTC} daily digest"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json data/
          if git diff --staged --quiet; then
            echo "No staged output changes; skipping commit/push"
            exit 0
          fi

          HEAD_SUBJECT=$(git log -1 --format=%s || true)
          if [ "$HEAD_SUBJECT" = "$DAILY_SUBJECT" ]; then
            git commit --amend -m "$DAILY_SUBJECT"
            git push --force-with-lease
          else
            git commit -m "$DAILY_SUBJECT"
            git push
          fi
