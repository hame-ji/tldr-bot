name: digest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      test_push:
        description: "Create a CI smoke commit"
        required: false
        default: "false"

permissions:
  actions: read
  contents: write

concurrency:
  group: digest-pipeline
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_API_BASE: "https://openrouter.ai/api/v1"
      OPENROUTER_PREFERRED_MODELS: "google/gemma-3-27b-it:free,qwen/qwen3-32b:free,deepseek/deepseek-r1:free"
      OPENROUTER_MIN_SPACING_SECONDS: "2"
      OPENROUTER_MAX_RETRIES: "8"
      OPENROUTER_INITIAL_BACKOFF_SECONDS: "10"
      OPENROUTER_MAX_BACKOFF_SECONDS: "180"
      OPENROUTER_MODELS_CACHE_TTL_SECONDS: "21600"
      NOTEBOOKLM_STORAGE_STATE: ${{ secrets.NOTEBOOKLM_STORAGE_STATE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate required secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
          test -n "$OPENROUTER_API_KEY"
          test -n "$NOTEBOOKLM_STORAGE_STATE"

      - name: Validate Telegram bot token and clear webhook
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" >/tmp/getme.json
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=false" >/tmp/delete_webhook.json

      - name: Validate polling endpoint
        run: |
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=1&timeout=0" >/tmp/getupdates.json

      - name: Run pipeline entrypoint
        id: pipeline
        run: |
          set -euo pipefail
          uv run python -m src | tee /tmp/pipeline.log

      - name: Extract pipeline outputs
        id: extract_outputs
        if: ${{ always() }}
        continue-on-error: true
        run: uv run python -m scripts.extract_pipeline_outputs /tmp/pipeline.log

      - name: Commit and push pipeline outputs
        id: persist_outputs
        if: ${{ steps.pipeline.outcome == 'success' }}
        run: |
          set -euo pipefail

          PROCESSED_URLS="$(
            uv run python - <<'PY'
from pathlib import Path
from src.telemetry.pipeline_log_parser import extract_pipeline_outputs

log_text = Path("/tmp/pipeline.log").read_text(encoding="utf-8")
outputs = extract_pipeline_outputs(log_text)
print(outputs["processed_urls"])
PY
          )"
          if [ "${PROCESSED_URLS}" = "0" ]; then
            echo "No processed URLs; skipping commit/push for empty day"
            echo "commit_status=skipped_empty_day" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TODAY_UTC=$(date -u +%F)
          DAILY_SUBJECT="chore(digest): ${TODAY_UTC} daily digest"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json data/
          if git diff --staged --quiet; then
            echo "No staged output changes; skipping commit/push"
            echo "commit_status=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "$DAILY_SUBJECT"
          git push
          echo "commit_status=pushed" >> "$GITHUB_OUTPUT"

      - name: Upload pipeline log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: /tmp/pipeline.log
          if-no-files-found: ignore

      - name: Write run history summary
        id: run_history
        if: ${{ always() }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIGEST_DATE: ${{ steps.extract_outputs.outputs.digest_date || 'unknown' }}
          PIPELINE_RESULT: ${{ steps.pipeline.outcome || 'unknown' }}
          PROCESSED_URLS: ${{ steps.extract_outputs.outputs.processed_urls || 'unknown' }}
          PIPELINE_SECONDS: ${{ steps.extract_outputs.outputs.pipeline_seconds || 'unknown' }}
          SECONDS_PER_PROCESSED_URL: ${{ steps.extract_outputs.outputs.seconds_per_processed_url || 'unknown' }}
          FETCH_FAILED_COUNT: ${{ steps.extract_outputs.outputs.fetch_failed_count || 'unknown' }}
        run: uv run python -m scripts.write_run_history_summary

      - name: Write job summary
        if: ${{ always() }}
        env:
          PIPELINE_RESULT: ${{ steps.pipeline.outcome || 'unknown' }}
          DIGEST_DATE: ${{ steps.extract_outputs.outputs.digest_date || 'unknown' }}
          PROCESSED_URLS: ${{ steps.extract_outputs.outputs.processed_urls || 'unknown' }}
          PIPELINE_SECONDS: ${{ steps.extract_outputs.outputs.pipeline_seconds || 'unknown' }}
          SECONDS_PER_PROCESSED_URL: ${{ steps.extract_outputs.outputs.seconds_per_processed_url || 'unknown' }}
          FETCH_OK_ARTICLE_COUNT: ${{ steps.extract_outputs.outputs.fetch_ok_article_count || 'unknown' }}
          FETCH_OK_YOUTUBE_COUNT: ${{ steps.extract_outputs.outputs.fetch_ok_youtube_count || 'unknown' }}
          FETCH_FAILED_COUNT: ${{ steps.extract_outputs.outputs.fetch_failed_count || 'unknown' }}
          DIGEST_CREATED: ${{ steps.extract_outputs.outputs.digest_created || 'unknown' }}
          COMMIT_STATUS: ${{ steps.persist_outputs.outputs.commit_status || 'not_required' }}
          EXTRACT_OUTPUTS_RESULT: ${{ steps.extract_outputs.outcome || 'unknown' }}
          RUN_HISTORY_RESULT: ${{ steps.run_history.outcome || 'unknown' }}
        run: |
          {
            echo "## Digest run"
            echo
            echo "- Digest date: ${DIGEST_DATE}"
            echo "- Pipeline step: ${PIPELINE_RESULT}"
            echo "- Processed URLs: ${PROCESSED_URLS}"
            echo "- Pipeline seconds: ${PIPELINE_SECONDS}"
            echo "- Seconds per processed URL: ${SECONDS_PER_PROCESSED_URL}"
            echo "- Source mix (fetch ok article/youtube): ${FETCH_OK_ARTICLE_COUNT}/${FETCH_OK_YOUTUBE_COUNT}"
            echo "- Fetch failures: ${FETCH_FAILED_COUNT}"
            echo "- Digest created: ${DIGEST_CREATED}"
            echo "- Output persistence: ${COMMIT_STATUS}"
            if [ "${EXTRACT_OUTPUTS_RESULT}" != "success" ]; then
              echo "- Warning: telemetry output extraction failed (non-blocking)"
            fi
            if [ "${RUN_HISTORY_RESULT}" != "success" ]; then
              echo "- Warning: run history summary failed (non-blocking)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
